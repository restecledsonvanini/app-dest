    <!-- Anti-flash: aplica tema e fonte antes do CSS renderizar -->
    <script>
        (function () {
            var t = localStorage.getItem('dest-theme') ||
                (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', t);
            var f = localStorage.getItem('dest-font-size');
            if (f) { var m = { sm: '14px', md: '16px', lg: '18px' }; document.documentElement.style.fontSize = m[f] || '16px'; }
        })();
    </script>
